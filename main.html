<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Happy Women's Day 2026 ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        .bg-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-hearts span {
            position: absolute; bottom: -40px; font-size: 20px; animation: floatUp linear infinite; opacity: 0.3;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(720deg) scale(0.3); opacity: 0; }
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a0a2e 0%, #0d1b2a 50%, #1a0a2e 100%);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .intro-card {
            background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 40px 48px; max-width: 680px; width: 90%; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .intro-card h1 {
            font-family: 'Dancing Script', cursive; font-size: 2.8em; color: #ff69b4;
            text-shadow: 0 0 30px rgba(255,105,180,0.5), 0 0 60px rgba(255,105,180,0.2);
            margin-bottom: 8px;
        }
        .intro-card .subtitle { color: rgba(255,255,255,0.6); font-size: 0.95em; margin-bottom: 28px; }

        .upload-area { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
        .upload-box {
            width: 180px; height: 180px; border: 2px dashed rgba(255,105,180,0.4);
            border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
            background: rgba(255,105,180,0.03);
        }
        .upload-box:hover { border-color: #ff69b4; background: rgba(255,105,180,0.08); transform: translateY(-2px); }
        .upload-box .icon { font-size: 2.2em; margin-bottom: 6px; }
        .upload-box p { color: rgba(255,255,255,0.7); font-size: 0.8em; padding: 0 8px; }
        .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-box img {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            border-radius: 14px; display: none;
        }

        .name-field { margin-bottom: 24px; }
        .name-field label { color: rgba(255,255,255,0.6); font-size: 0.85em; display: block; margin-bottom: 6px; }
        .name-field input {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 10px 16px; color: #fff; font-size: 1em;
            width: 280px; max-width: 100%; outline: none; transition: border 0.3s;
            font-family: 'Quicksand', sans-serif;
        }
        .name-field input:focus { border-color: #ff69b4; }
        .name-field input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-group { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 32px; border: none; border-radius: 12px; font-size: 1em; cursor: pointer;
            font-family: 'Quicksand', sans-serif; font-weight: 600; transition: all 0.3s;
        }
        .btn.primary {
            background: linear-gradient(135deg, #ff69b4, #e040fb); color: #fff;
            box-shadow: 0 4px 20px rgba(255,105,180,0.4);
        }
        .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,105,180,0.6); }
        .btn.secondary {
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn.secondary:hover { background: rgba(255,255,255,0.12); }

        #phaseMsg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }
        #phaseMsg .text {
            font-family: 'Dancing Script', cursive; font-size: 2.4em; color: #fff;
            text-shadow: 0 0 30px rgba(255,105,180,0.6); opacity: 0;
            transition: opacity 0.6s ease;
        }
        #phaseMsg .text.show { opacity: 1; }

        #finalPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 60;
            display: flex; justify-content: center; padding: 24px;
            transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        #finalPanel.show { transform: translateY(0); }
        .final-card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;

            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);

            pointer-events: none; opacity: 0; transition: opacity 0.5s;

        @media (max-width: 600px) {
            .intro-card { padding: 28px 20px; }
            .intro-card h1 { font-size: 2em; }
            .upload-box { width: 140px; height: 140px; }
            .final-card { padding: 20px 24px; }

            <button class="btn secondary" onclick="location.reload()">🔄 Xem lại</button>

</div>

<script>
"use strict";

// ═══════════════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════════════
const CFG = {
    PARTICLE_COUNT: 10000,
    SPRING: 0.045,
    DAMPING: 0.88,
    MOUSE_RADIUS: 120,
    MOUSE_RADIUS_SQ: 120 * 120,
    MOUSE_FORCE: 12,
    COLOR_LERP: 0.045,
    MAX_MOSAIC_PIXELS: 20_000_000,
    ZOOM_END: 3.0,
    IMG_FIT_FACTOR: 0.88,
};

const WORDS = [
    "Xinh đẹp ", "Giỏi giang ", "Tuyệt vời ", "Dịu dàng ", "Mạnh mẽ ",
    "Thông minh ", "Tài năng ", "Kiên cường ", "Rạng rỡ ", "Tỏa sáng ",
    "Yêu thương ", "Happy 8/3 ", "Women's Day ", "Hạnh phúc ",
    "♡ ", "✿ ", "★ ", "Amazing ",
];

// Phase sets — O(1) lookup instead of Array.includes() per frame
const PARTICLE_PHASES = new Set([
    'EXPLOSION', 'FLY', 'HEART', 'STAR', 'FLOWER', 'REFORM', 'INTERACTIVE'
]);
const SPRING_PHASES = new Set([
    'HEART', 'STAR', 'FLOWER', 'REFORM', 'INTERACTIVE'
]);

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let canvas, ctx, W, H, DPR = 1;
let image1 = null, image2 = null;
let recipientName = '';

let particles = [];
let particleCount = 0;

let confetti = [];
let confettiCount = 0;
let petals = [];
let shockwaves = [];
let shockwaveCount = 0;

let mosaicCanvas = null;
let mosaicMaxZoom = 3.0;
let zoomLevel = 1.0;

let phase = 'IDLE';
let phaseTime = 0;
let phaseStartTime = 0;

let mouseX = -9999, mouseY = -9999, mouseActive = false;

let img1Points = null, img2Points = null;
let heartPts = null, starPts = null, flowerPts = null;

// Cached overlay — built once, redrawn from buffer (no gradient calc per frame)
let vignetteCanvas = null;

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const rand  = (a, b) => a + Math.random() * (b - a);

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
}

function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - ((-2 * t + 2) ** 3) / 2;
}

function fileToImage(file) {
    return new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => res(img);
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ═══════════════════════════════════════════════════════════════
//  CACHED VIGNETTE — built once per resize, drawn from buffer
// ═══════════════════════════════════════════════════════════════
function buildVignetteCache() {
    vignetteCanvas = document.createElement('canvas');
    vignetteCanvas.width = W;
    vignetteCanvas.height = H;
    const vCtx = vignetteCanvas.getContext('2d');
    const g = vCtx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.75);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,0.45)');
    vCtx.fillStyle = g;
    vCtx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════════════
//  DEFAULT DEMO IMAGES (800×800 canvas-drawn)
// ═══════════════════════════════════════════════════════════════
function createDefaultImage1() {
    const S = 800, c = document.createElement('canvas');
    c.width = S; c.height = S;
    const g = c.getContext('2d');
    const r = S / 500;

    const bg = g.createRadialGradient(S/2, S/2, 0, S/2, S/2, S*0.7);
    bg.addColorStop(0, '#2d1b4e');
    bg.addColorStop(1, '#0a0a1a');
    g.fillStyle = bg;
    g.fillRect(0, 0, S, S);

    for (let i = 0; i < 30; i++) {
        g.beginPath();
        g.arc(rand(50*r, S-50*r), rand(50*r, S-50*r), rand(8,35)*r, 0, Math.PI*2);
        g.fillStyle = `hsla(${rand(300,360)},80%,60%,${rand(0.05,0.15)})`;
        g.fill();
    }

    g.fillStyle = '#ff69b4'; g.font = `bold ${220*r|0}px Georgia,serif`;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.shadowColor = '#ff69b4'; g.shadowBlur = 50;
    g.fillText('8', 170*r, 260*r);

    g.fillStyle = '#ffd700'; g.font = `bold ${160*r|0}px Georgia,serif`;
    g.shadowColor = '#ffd700'; g.shadowBlur = 35;
    g.fillText('/', 280*r, 250*r);

    g.fillStyle = '#e040fb'; g.font = `bold ${220*r|0}px Georgia,serif`;
    g.shadowColor = '#e040fb'; g.shadowBlur = 50;
    g.fillText('3', 380*r, 260*r);
    g.shadowBlur = 0;

    g.font = `${30*r|0}px serif`;
    const hearts = ['💝','🌸','✨','💗','🌺','⭐','💖'];
    for (let i = 0; i < 20; i++) {
        g.fillText(hearts[i % hearts.length], rand(20*r, S-30*r), rand(20*r, S-20*r));
    }
    return c;
}

function createDefaultImage2() {
    const S = 800, c = document.createElement('canvas');
    c.width = S; c.height = S;
    const g = c.getContext('2d');
    const k = S / 500;

    g.fillStyle = '#0a0a1a';
    g.fillRect(0, 0, S, S);

    const cx = S/2, cy = 230*k, sc = 13*k;
    const grad = g.createRadialGradient(cx, cy, 0, cx, cy+40, sc*18);
    grad.addColorStop(0, '#ff1493');
    grad.addColorStop(0.5, '#e91e63');
    grad.addColorStop(1, '#9c27b0');
    g.fillStyle = grad;
    g.shadowColor = '#ff1493'; g.shadowBlur = 50;
    g.beginPath();
    for (let t = 0; t <= Math.PI*2; t += 0.01) {
        const hx = 16 * Math.sin(t) ** 3;
        const hy = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
        t === 0 ? g.moveTo(cx + hx*sc, cy + hy*sc) : g.lineTo(cx + hx*sc, cy + hy*sc);
    }
    g.closePath(); g.fill(); g.shadowBlur = 0;

    g.fillStyle = '#fff';
    g.font = `bold ${36*k|0}px Quicksand,sans-serif`;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('Happy', cx, cy - 20*k);
    g.font = `bold ${54*k|0}px Georgia,serif`;
    g.fillText('8/3', cx, cy + 30*k);

    g.font = `${24*k|0}px serif`;
    const sparkles = ['✨','💫','⭐','🌟'];
    for (let i = 0; i < 24; i++) {
        const a = rand(0, Math.PI*2), rr = rand(sc*16/k, sc*20/k);
        g.fillText(sparkles[i%4], cx + Math.cos(a)*rr, cy + Math.sin(a)*rr);
    }
    return c;
}

// ═══════════════════════════════════════════════════════════════
//  IMAGE SAMPLING — aspect-ratio-aware "contain" fit
// ═══════════════════════════════════════════════════════════════
function sampleImage(imgSource, targetCount, dispW, dispH) {
    const maxDim = 550;
    const imgAR = imgSource.width / imgSource.height;
    let sw, sh;
    if (imgAR >= 1) { sw = maxDim; sh = (maxDim / imgAR) | 0; }
    else             { sh = maxDim; sw = (maxDim * imgAR) | 0; }

    const tmp = document.createElement('canvas');
    tmp.width = sw; tmp.height = sh;
    const tCtx = tmp.getContext('2d');
    tCtx.drawImage(imgSource, 0, 0, sw, sh);
    const data = tCtx.getImageData(0, 0, sw, sh).data;

    // "Contain" fit: maintain aspect ratio, centered, with padding
    const fitScale = Math.min(dispW / sw, dispH / sh) * CFG.IMG_FIT_FACTOR;
    const offX = (dispW - sw * fitScale) / 2;
    const offY = (dispH - sh * fitScale) / 2;

    const step = Math.max(1, Math.sqrt(sw * sh / (targetCount * 1.3)) | 0);
    const pts = [];
    for (let y = 0; y < sh; y += step) {
        for (let x = 0; x < sw; x += step) {
            const i = (y * sw + x) << 2;
            if (data[i + 3] < 30) continue;
            pts.push({
                x: offX + x * fitScale,
                y: offY + y * fitScale,
                r: data[i], g: data[i+1], b: data[i+2]
            });
        }
    }
    shuffle(pts);

    if (pts.length > targetCount) pts.length = targetCount;
    const base = pts.length;
    while (pts.length < targetCount) {
        const s = pts[(Math.random() * base) | 0];
        pts.push({ x: s.x + rand(-2, 2), y: s.y + rand(-2, 2), r: s.r, g: s.g, b: s.b });
    }

    // Free temp canvas immediately
    tmp.width = 0; tmp.height = 0;
    return pts;
}

// ═══════════════════════════════════════════════════════════════
//  SHAPE GENERATORS — heart / star / flower
// ═══════════════════════════════════════════════════════════════
function generateShapePoints(shapeName, count, cw, ch) {
    const sz = 300;
    const tmp = document.createElement('canvas');
    tmp.width = sz; tmp.height = sz;
    const g = tmp.getContext('2d');

    if (shapeName === 'heart') {
        g.fillStyle = '#f00'; g.beginPath();
        const cx2 = sz/2, cy2 = sz/2.15, s = sz/35;
        for (let t = 0; t <= Math.PI*2; t += 0.02) {
            const hx = 16 * Math.sin(t)**3;
            const hy = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
            t === 0 ? g.moveTo(cx2+hx*s, cy2+hy*s) : g.lineTo(cx2+hx*s, cy2+hy*s);
        }
        g.closePath(); g.fill();
    } else if (shapeName === 'star') {
        g.fillStyle = '#ff0'; g.beginPath();
        const cx2 = sz/2, cy2 = sz/2, oR = sz*0.45, iR = sz*0.18;
        for (let i = 0; i < 10; i++) {
            const r = i % 2 === 0 ? oR : iR;
            const a = i * Math.PI / 5 - Math.PI / 2;
            i === 0 ? g.moveTo(cx2+Math.cos(a)*r, cy2+Math.sin(a)*r)
                     : g.lineTo(cx2+Math.cos(a)*r, cy2+Math.sin(a)*r);
        }
        g.closePath(); g.fill();
    } else {
        const cx2 = sz/2, cy2 = sz/2, pR = sz*0.2;
        for (let i = 0; i < 6; i++) {
            const a = (i/6) * Math.PI * 2;
            g.fillStyle = `hsl(${320+i*12},80%,65%)`;
            g.beginPath();
            g.ellipse(cx2+Math.cos(a)*pR*0.7, cy2+Math.sin(a)*pR*0.7, pR, pR*0.55, a, 0, Math.PI*2);
            g.fill();
        }
        g.fillStyle = '#ffe066';
        g.beginPath(); g.arc(cx2, cy2, pR*0.35, 0, Math.PI*2); g.fill();
    }

    // Encode filled pixel coords as packed int (x | y<<16) — saves ~40% memory vs {x,y} objects
    const data = g.getImageData(0, 0, sz, sz).data;
    const filled = [];
    for (let y = 0; y < sz; y++) {
        for (let x = 0; x < sz; x++) {
            if (data[((y * sz + x) << 2) + 3] > 128) filled.push(x | (y << 16));
        }
    }
    shuffle(filled);

    const fitDim = Math.min(cw, ch) * 0.6;
    const dispScale = fitDim / sz;
    const offX = (cw - sz * dispScale) / 2;
    const offY = (ch - sz * dispScale) / 2;

    const pts = [];
    const fLen = filled.length;
    for (let i = 0; i < count; i++) {
        const packed = filled[i % fLen];
        const px = packed & 0xFFFF;
        const py = packed >> 16;
        const jx = i >= fLen ? rand(-2, 2) : 0;
        const jy = i >= fLen ? rand(-2, 2) : 0;

        let r, g2, b;
        if (shapeName === 'heart')      { r = 200+rand(0,55); g2 = 20+rand(0,80); b = 60+rand(0,80); }
        else if (shapeName === 'star')  { r = 255; g2 = 180+rand(0,75); b = rand(0,60); }
        else                            { r = 200+rand(0,55); g2 = 80+rand(0,120); b = 170+rand(0,85); }
        pts.push({ x: offX + (px+jx)*dispScale, y: offY + (py+jy)*dispScale, r, g: g2, b });
    }

    tmp.width = 0; tmp.height = 0; // free memory
    return pts;
}

// ═══════════════════════════════════════════════════════════════
//  TEXT MOSAIC — memory-capped, aspect-ratio preserving
// ═══════════════════════════════════════════════════════════════
function buildMosaic(imgSource) {
    // Mosaic canvas uses IMAGE's aspect ratio — preserves original proportions
    const imgAR = imgSource.width / imgSource.height;
    const maxDim = Math.max(W, H) * 3;
    let mW, mH;
    if (imgAR >= 1) { mW = maxDim; mH = (maxDim / imgAR) | 0; }
    else             { mH = maxDim; mW = (mH * imgAR) | 0; }

    // Cap total pixel budget
    const totalPx = mW * mH;
    if (totalPx > CFG.MAX_MOSAIC_PIXELS) {
        const sc = Math.sqrt(CFG.MAX_MOSAIC_PIXELS / totalPx);
        mW = (mW * sc) | 0;
        mH = (mH * sc) | 0;
    }

    mosaicCanvas = document.createElement('canvas');
    mosaicCanvas.width = mW;
    mosaicCanvas.height = mH;
    const mCtx = mosaicCanvas.getContext('2d');

    mCtx.fillStyle = '#0a0a1a';
    mCtx.fillRect(0, 0, mW, mH);

    const fontSize = Math.max(7, Math.round(10 * Math.max(mW, mH) / maxDim));
    const charW = fontSize * 0.6;
    const lineH = fontSize * 1.18;
    const cols = (mW / charW) | 0;
    const rows = (mH / lineH) | 0;

    // Image colors fill the ENTIRE grid — mosaic AR matches image AR
    const colorCanvas = document.createElement('canvas');
    colorCanvas.width = cols;
    colorCanvas.height = rows;
    const cCtx = colorCanvas.getContext('2d');
    cCtx.drawImage(imgSource, 0, 0, cols, rows);
    const cData = cCtx.getImageData(0, 0, cols, rows).data;

    // Render text mosaic
    mCtx.font = `${fontSize}px "Courier New",monospace`;
    mCtx.textBaseline = 'top';

    const allWords = [...WORDS];
    if (recipientName.trim()) {
        allWords.push(recipientName.trim() + ' ', recipientName.trim() + ' ');
    }
    const wordCount = allWords.length;

    let wIdx = 0;
    for (let row = 0; row < rows; row++) {
        let col = 0;
        while (col < cols) {
            const word = allWords[wIdx % wordCount];
            wIdx++;
            const wLen = word.length;
            for (let ci = 0; ci < wLen && col + ci < cols; ci++) {
                const gc = col + ci;
                const pi = (row * cols + gc) << 2;
                mCtx.fillStyle = `rgb(${cData[pi]},${cData[pi+1]},${cData[pi+2]})`;
                mCtx.fillText(word[ci], gc * charW, row * lineH);
            }
            col += wLen;
        }
    }

    // Free color canvas memory
    colorCanvas.width = 0; colorCanvas.height = 0;

    // Adaptive max zoom: how far can we zoom before characters pixelate
    const containScale = Math.min(W / mW, H / mH);
    const charScreenSize = charW * containScale;
    mosaicMaxZoom = clamp(5.0 / charScreenSize, 2.0, 5.0);

    zoomLevel = 1.0;
}

function drawMosaic() {
    if (!mosaicCanvas) return;
    const mW = mosaicCanvas.width;
    const mH = mosaicCanvas.height;
    const mAR = mW / mH;
    const screenAR = W / H;

    // "Contain" fit — preserves image's original aspect ratio on screen
    let fitW, fitH;
    if (mAR > screenAR) { fitW = W; fitH = W / mAR; }
    else                 { fitH = H; fitW = H * mAR; }

    // Zoom scales up from center (camera moves closer)
    const dw = fitW * zoomLevel;
    const dh = fitH * zoomLevel;
    const dx = (W - dw) / 2;
    const dy = (H - dh) / 2;

    ctx.drawImage(mosaicCanvas, 0, 0, mW, mH, dx, dy, dw, dh);
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLE RENDERING — split by shape for optimal batching
//  Shape 0 = anti-aliased circle (arc), 1/2/3 = path-based
// ═══════════════════════════════════════════════════════════════
function drawParticlesDots() {
    for (let i = 0; i < particleCount; i++) {
        const p = particles[i];
        if (p.shape !== 0) continue;
        const r = p.size < 1.2 ? 1.2 : p.size;
        ctx.fillStyle = `rgba(${p.r|0},${p.g|0},${p.b|0},${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, 6.2832);
        ctx.fill();
    }
}

function drawParticlesShaped() {
    for (let i = 0; i < particleCount; i++) {
        const p = particles[i];
        if (p.shape === 0) continue;
        ctx.fillStyle = `rgba(${p.r|0},${p.g|0},${p.b|0},${p.alpha})`;
        if (p.shape === 1) drawHeartShape(p.x, p.y, p.size);
        else if (p.shape === 2) drawStarShape(p.x, p.y, p.size);
        else drawFlowerShape(p.x, p.y, p.size);
    }
}

function drawHeartShape(cx, cy, s) {
    const hs = s * 0.55;
    ctx.beginPath();
    ctx.moveTo(cx, cy + hs * 0.35);
    ctx.bezierCurveTo(cx + hs, cy - hs*0.4, cx + hs*0.55, cy - hs, cx, cy - hs*0.35);
    ctx.bezierCurveTo(cx - hs*0.55, cy - hs, cx - hs, cy - hs*0.4, cx, cy + hs*0.35);
    ctx.fill();
}

function drawStarShape(cx, cy, s) {
    const oR = s * 0.5, iR = s * 0.2;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? oR : iR;
        const a = i * Math.PI / 5 - Math.PI / 2;
        i === 0 ? ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
                 : ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
}

function drawFlowerShape(cx, cy, s) {
    const pR = s * 0.35;
    for (let i = 0; i < 5; i++) {
        const a = (i/5) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.ellipse(cx+Math.cos(a)*pR*0.55, cy+Math.sin(a)*pR*0.55, pR*0.5, pR*0.3, a, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.beginPath(); ctx.arc(cx, cy, pR*0.22, 0, Math.PI*2); ctx.fill();
}

function drawAllParticles() {
    drawParticlesDots();
    drawParticlesShaped();
}

// ═══════════════════════════════════════════════════════════════
//  CONFETTI — O(1) swap-and-pop removal instead of O(n) splice
// ═══════════════════════════════════════════════════════════════
function spawnConfetti(cx, cy, count) {
    for (let i = 0; i < count; i++) {
        const angle = rand(0, Math.PI*2);
        const speed = rand(4, 14);
        confetti.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - rand(2, 6),
            r: rand(0,255)|0, g: rand(0,255)|0, b: rand(0,255)|0,
            size: rand(3, 6),
            life: 1,
            decay: rand(0.01, 0.022),
            rotation: rand(0, Math.PI*2),
            rotSpeed: rand(-0.2, 0.2),
        });
    }
    confettiCount = confetti.length;
}

function updateConfetti() {
    let i = 0;
    while (i < confettiCount) {
        const c = confetti[i];
        c.vy += 0.15;
        c.vx *= 0.99;
        c.x += c.vx;
        c.y += c.vy;
        c.life -= c.decay;
        c.rotation += c.rotSpeed;
        if (c.life <= 0) {
            confettiCount--;
            if (i < confettiCount) confetti[i] = confetti[confettiCount];
            confetti.length = confettiCount;
        } else {
            i++;
        }
    }
}

function drawConfetti() {
    for (let i = 0; i < confettiCount; i++) {
        const c = confetti[i];
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rotation);
        ctx.globalAlpha = c.life;
        ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════
//  PETALS — combined update+draw (single pass, 15 elements)
// ═══════════════════════════════════════════════════════════════
function initPetals() {
    petals = [];
    for (let i = 0; i < 15; i++) {
        petals.push({
            x: rand(0, W), y: rand(-H, H),
            vx: rand(-0.3, 0.3), vy: rand(0.3, 1.2),
            size: rand(6, 14), rot: rand(0, Math.PI*2),
            rotV: rand(-0.02, 0.02), alpha: rand(0.15, 0.3),
            hue: rand(320, 360) | 0,
        });
    }
}

function updateAndDrawPetals() {
    for (let i = 0; i < petals.length; i++) {
        const p = petals[i];
        p.x += p.vx + Math.sin(p.y * 0.005) * 0.3;
        p.y += p.vy;
        p.rot += p.rotV;
        if (p.y > H + 20) { p.y = -20; p.x = rand(0, W); }
        if (p.x > W + 20) p.x = -20;
        if (p.x < -20) p.x = W + 20;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = `hsla(${p.hue},70%,70%,${p.alpha})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════════════
//  SHOCKWAVES — O(1) removal, combined update+draw
// ═══════════════════════════════════════════════════════════════
function spawnShockwave(x, y) {
    shockwaves.push({ x, y, radius: 0, maxRadius: Math.max(W, H) * 0.8, life: 1 });
    shockwaveCount = shockwaves.length;
}

function updateAndDrawShockwaves() {
    let i = 0;
    while (i < shockwaveCount) {
        const s = shockwaves[i];
        s.radius += (s.maxRadius - s.radius) * 0.06;
        s.life -= 0.015;
        if (s.life <= 0) {
            shockwaveCount--;
            if (i < shockwaveCount) shockwaves[i] = shockwaves[shockwaveCount];
            shockwaves.length = shockwaveCount;
            continue;
        }
        ctx.strokeStyle = `rgba(255,105,180,${(s.life * 0.4).toFixed(2)})`;
        ctx.lineWidth = Math.max(1, 4 * s.life);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.stroke();
        i++;
    }
}

// ═══════════════════════════════════════════════════════════════
//  PHASE MANAGEMENT
// ═══════════════════════════════════════════════════════════════
const PHASE_DURATIONS = {
    MOSAIC_IN: 2.0,
    MOSAIC_HOLD: 2.5,
    ZOOM: 3.5,
    ZOOM_HOLD: 2.5,
    FLASH: 0.4,
    EXPLOSION: 2.0,
    FLY: 0.8,
    HEART: 3.0,
    STAR: 3.0,
    FLOWER: 3.0,
    REFORM: 3.5,
    INTERACTIVE: Infinity,
};

// Pre-built static map (no object allocation per frame)
const PHASE_TRANSITIONS = {
    MOSAIC_IN: 'MOSAIC_HOLD',
    MOSAIC_HOLD: 'ZOOM',
    ZOOM: 'ZOOM_HOLD',
    ZOOM_HOLD: 'FLASH',
    FLASH: 'EXPLOSION',
    EXPLOSION: 'FLY',
    FLY: 'HEART',
    HEART: 'STAR',
    STAR: 'FLOWER',
    FLOWER: 'REFORM',
    REFORM: 'INTERACTIVE',
};

function setPhase(name) {
    phase = name;
    phaseStartTime = performance.now();
    phaseTime = 0;

    switch (name) {
        case 'MOSAIC_IN':
            document.getElementById('scanlines').style.opacity = '0.6';
            break;
        case 'ZOOM':
            showPhaseMsg('Nhìn kỹ hơn nhé... 🔍');
            break;
        case 'ZOOM_HOLD':
            showPhaseMsg('Mỗi từ là một lời chúc dành cho bạn ✨');
            break;
        case 'FLASH': {
            const flash = document.getElementById('flash');
            flash.style.transition = 'opacity 0.05s';
            flash.style.opacity = '1';
            document.getElementById('scanlines').style.opacity = '0';
            setTimeout(() => {
                flash.style.transition = 'opacity 0.35s';
                flash.style.opacity = '0';
            }, 80);
            initParticlesFromImage1();
            spawnShockwave(W / 2, H / 2);
            spawnConfetti(W / 2, H / 2, 60);
            // FREE mosaic memory — no longer needed after this phase
            if (mosaicCanvas) {
                mosaicCanvas.width = 0; mosaicCanvas.height = 0;
                mosaicCanvas = null;
            }
            break;
        }
        case 'EXPLOSION':
            showPhaseMsg('');
            for (let i = 0; i < particleCount; i++) {
                const p = particles[i];
                const dx = p.x - W / 2;
                const dy = p.y - H / 2;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                p.vx = (dx / dist) * rand(8, 20) + rand(-3, 3);
                p.vy = (dy / dist) * rand(8, 20) + rand(-5, 2);
                p.shape = (rand(0, 4)) | 0;
                p.size = rand(4, 9);
            }
            break;
        case 'HEART':
            showPhaseMsg('💕');
            setParticleTargets(heartPts);
            break;
        case 'STAR':
            showPhaseMsg('⭐');
            setParticleTargets(starPts);
            break;
        case 'FLOWER':
            showPhaseMsg('🌸');
            setParticleTargets(flowerPts);
            break;
        case 'REFORM':
            showPhaseMsg('');
            setParticleTargets(img2Points);
            for (let i = 0; i < particleCount; i++) {
                particles[i].shape = 0;
                particles[i].tsize = rand(2.8, 4.5);
            }
            break;
        case 'INTERACTIVE':
            showPhaseMsg('Di chuột / chạm để tương tác 💝');
            setTimeout(() => showPhaseMsg(''), 3000);
            setTimeout(() => {
                document.getElementById('finalPanel').classList.add('show');
                typewriterMessage();
            }, 2000);
            // FREE target arrays no longer needed
            heartPts = starPts = flowerPts = img1Points = null;
            break;
    }
}

function setParticleTargets(pts) {
    for (let i = 0; i < particleCount; i++) {
        const t = pts[i], p = particles[i];
        p.tx = t.x; p.ty = t.y;
        p.tr = t.r; p.tg = t.g; p.tb = t.b;
        p.tsize = rand(4, 8);
    }
}

function initParticlesFromImage1() {
    particleCount = img1Points.length;
    particles = new Array(particleCount);
    for (let i = 0; i < particleCount; i++) {
        const p = img1Points[i];
        particles[i] = {
            x: p.x, y: p.y,
            vx: 0, vy: 0,
            tx: p.x, ty: p.y,
            r: p.r, g: p.g, b: p.b,
            tr: p.r, tg: p.g, tb: p.b,
            size: 3.0, tsize: 3.0,
            shape: 0,
            alpha: 1,
        };
    }
}

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
function showPhaseMsg(text) {
    const el = document.getElementById('phaseMsgText');
    el.classList.remove('show');
    if (text) {
        el.textContent = text;
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    }
}

function typewriterMessage() {
    const name = recipientName.trim() || 'Bạn';
    const lines = [
        { el: 'finalLine1', text: `Gửi đến ${name},`, cls: 'name-highlight' },
        { el: 'finalLine2', text: 'Bạn thật xinh đẹp, giỏi giang và tuyệt vời!' },
        { el: 'finalLine3', text: 'Chúc bạn ngày 8/3 thật nhiều niềm vui và hạnh phúc! 💐' },
    ];
    let delay = 0;
    for (const line of lines) {
        const el = document.getElementById(line.el);
        el.textContent = '';
        if (line.cls) el.classList.add(line.cls);
        const chars = line.text;
        for (let ci = 0; ci < chars.length; ci++) {
            const d = delay + ci * 40;
            const ch = chars[ci];
            setTimeout(() => { el.textContent += ch; }, d);
        }
        delay += chars.length * 40 + 300;
    }
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE — tight physics loops
// ═══════════════════════════════════════════════════════════════
function update() {
    phaseTime = (performance.now() - phaseStartTime) / 1000;

    // Phase transition
    const dur = PHASE_DURATIONS[phase];
    if (dur !== undefined && dur !== Infinity && phaseTime >= dur) {
        const next = PHASE_TRANSITIONS[phase];
        if (next) { setPhase(next); return; }
    }

    // Zoom animation
    if (phase === 'ZOOM') {
        const t = easeInOutCubic(clamp(phaseTime / PHASE_DURATIONS.ZOOM, 0, 1));
        zoomLevel = lerp(1.0, mosaicMaxZoom, t);
    }

    // Particle physics — hot loop, all constants hoisted out
    if (phase === 'EXPLOSION' || phase === 'FLY') {
        for (let i = 0; i < particleCount; i++) {
            const p = particles[i];
            p.vy += 0.08;
            p.vx *= 0.993;
            p.vy *= 0.993;
            p.x += p.vx;
            p.y += p.vy;
            p.r += (p.tr - p.r) * 0.02;
            p.g += (p.tg - p.g) * 0.02;
            p.b += (p.tb - p.b) * 0.02;
        }
    } else if (SPRING_PHASES.has(phase)) {
        const isInteractive = phase === 'INTERACTIVE';
        const spring = isInteractive ? CFG.SPRING * 1.2 : CFG.SPRING;
        const damp = isInteractive ? CFG.DAMPING : 0.86;
        const colorLerp = CFG.COLOR_LERP;
        const doMouse = mouseActive || isInteractive;
        const mRSq = CFG.MOUSE_RADIUS_SQ;
        const mR = CFG.MOUSE_RADIUS;
        const mF = CFG.MOUSE_FORCE;
        const mx = mouseX, my = mouseY;

        for (let i = 0; i < particleCount; i++) {
            const p = particles[i];
            p.vx += (p.tx - p.x) * spring;
            p.vy += (p.ty - p.y) * spring;

            // Mouse repulsion — squared-distance early exit avoids sqrt for ~95% of particles
            if (doMouse) {
                const dx = p.x - mx;
                const dy = p.y - my;
                const dSq = dx * dx + dy * dy;
                if (dSq < mRSq && dSq > 1) {
                    const dist = Math.sqrt(dSq);
                    const invF = (mR - dist) / mR * mF / dist;
                    p.vx += dx * invF;
                    p.vy += dy * invF;
                }
            }

            p.vx *= damp;
            p.vy *= damp;
            p.x += p.vx;
            p.y += p.vy;

            p.r += (p.tr - p.r) * colorLerp;
            p.g += (p.tg - p.g) * colorLerp;
            p.b += (p.tb - p.b) * colorLerp;
            p.size += (p.tsize - p.size) * 0.05;
        }
    }

    updateConfetti();
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
    const isParticle = PARTICLE_PHASES.has(phase);

    // Background: motion trail for particles, solid clear for mosaic
    if (isParticle) {
        ctx.fillStyle = 'rgba(10,10,26,0.18)';
        ctx.fillRect(0, 0, W, H);
    } else {
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, W, H);
    }

    updateAndDrawPetals();

    // Phase-specific rendering
    switch (phase) {
        case 'MOSAIC_IN':
            ctx.globalAlpha = clamp(phaseTime / 1.5, 0, 1);
            drawMosaic();
            ctx.globalAlpha = 1;
            break;
        case 'MOSAIC_HOLD':
        case 'ZOOM':
        case 'ZOOM_HOLD':
            drawMosaic();
            if (phase === 'ZOOM' || phase === 'ZOOM_HOLD') {
                const t = phase === 'ZOOM' ? phaseTime / PHASE_DURATIONS.ZOOM : 1;
                ctx.fillStyle = `rgba(255,105,180,${(0.03 * t).toFixed(3)})`;
                ctx.fillRect(0, 0, W, H);
            }
            break;
        case 'FLASH': {
            const t = phaseTime / PHASE_DURATIONS.FLASH;
            if (t > 0.3) {
                ctx.globalAlpha = (t - 0.3) / 0.7;
                drawAllParticles();
                ctx.globalAlpha = 1;
            }
            break;
        }
        default:
            if (isParticle) {
                drawAllParticles();
                // Lightweight glow for shape formations
                if (phase === 'HEART' || phase === 'STAR' || phase === 'FLOWER') {
                    ctx.globalAlpha = 0.07;
                    ctx.fillStyle = '#ff69b4';
                    for (let i = 0; i < particleCount; i += 12) {
                        const p = particles[i];
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * 1.5, 0, 6.2832);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }
                // Additive bloom for image formation — richer particle art
                if (phase === 'REFORM' || phase === 'INTERACTIVE') {
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.globalAlpha = 0.1;
                    for (let i = 0; i < particleCount; i += 4) {
                        const p = particles[i];
                        if (p.shape !== 0) continue;
                        ctx.fillStyle = `rgb(${p.r|0},${p.g|0},${p.b|0})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * 1.8, 0, 6.2832);
                        ctx.fill();
                    }
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 1;
                }
            }
            break;
    }

    updateAndDrawShockwaves();
    if (confettiCount > 0) drawConfetti();

    // Cached vignette (drawn from pre-rendered canvas — zero gradient calc per frame)
    if (vignetteCanvas) ctx.drawImage(vignetteCanvas, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop() {
    if (phase !== 'IDLE') {
        update();
        render();
    }
    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════
function setupEvents() {
    canvas.addEventListener('mousemove', e => {
        mouseX = e.clientX; mouseY = e.clientY; mouseActive = true;
    });
    canvas.addEventListener('mouseleave', () => {
        mouseActive = false; mouseX = mouseY = -9999;
    });

    canvas.addEventListener('click', e => {
        if (phase !== 'INTERACTIVE') return;
        const ex = e.clientX, ey = e.clientY;
        spawnShockwave(ex, ey);
        spawnConfetti(ex, ey, 30);
        const burstRSq = 180 * 180;
        for (let i = 0; i < particleCount; i++) {
            const p = particles[i];
            const dx = p.x - ex, dy = p.y - ey;
            const dSq = dx * dx + dy * dy;
            if (dSq < burstRSq && dSq > 1) {
                const dist = Math.sqrt(dSq);
                const force = (180 - dist) / 180 * 16;
                p.vx += (dx / dist) * force;
                p.vy += (dy / dist) * force;
            }
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        mouseX = t.clientX; mouseY = t.clientY; mouseActive = true;
    }, { passive: false });
    canvas.addEventListener('touchend', () => {
        mouseActive = false; mouseX = mouseY = -9999;
    });
    canvas.addEventListener('touchstart', e => {
        if (phase === 'INTERACTIVE') {
            const t = e.touches[0];
            spawnShockwave(t.clientX, t.clientY);
            spawnConfetti(t.clientX, t.clientY, 20);
        }
    });

    window.addEventListener('keydown', e => {
        if (e.code === 'Space' && phase !== 'IDLE' && phase !== 'INTERACTIVE') {
            e.preventDefault();
            if (!particles.length) initParticlesFromImage1();
            if (mosaicCanvas) { mosaicCanvas.width = 0; mosaicCanvas.height = 0; mosaicCanvas = null; }
            setPhase('REFORM');
        }
    });
}

// ═══════════════════════════════════════════════════════════════
//  INTRO UI
// ═══════════════════════════════════════════════════════════════
function setupIntroUI() {
    const file1 = document.getElementById('file1');
    const file2 = document.getElementById('file2');
    const prev1 = document.getElementById('preview1');
    const prev2 = document.getElementById('preview2');

    file1.addEventListener('change', async e => {
        if (e.target.files[0]) {
            image1 = await fileToImage(e.target.files[0]);
            prev1.src = image1.src; prev1.style.display = 'block';
        }
    });
    file2.addEventListener('change', async e => {
        if (e.target.files[0]) {
            image2 = await fileToImage(e.target.files[0]);
            prev2.src = image2.src; prev2.style.display = 'block';
        }
    });

    document.getElementById('startBtn').addEventListener('click', () => startExperience(false));
    document.getElementById('demoBtn').addEventListener('click', () => startExperience(true));
}

async function startExperience(useDemo) {
    recipientName = document.getElementById('nameInput').value;
    if (useDemo || !image1) image1 = createDefaultImage1();
    if (useDemo || !image2) image2 = createDefaultImage2();

    document.getElementById('overlay').classList.add('hidden');

    const N = CFG.PARTICLE_COUNT;
    buildMosaic(image1);
    img1Points  = sampleImage(image1, N, W, H);
    img2Points  = sampleImage(image2, N, W, H);
    heartPts    = generateShapePoints('heart', N, W, H);
    starPts     = generateShapePoints('star', N, W, H);
    flowerPts   = generateShapePoints('flower', N, W, H);

    // Release source images — data is now in point arrays
    image1 = image2 = null;

    setPhase('MOSAIC_IN');
}

// ═══════════════════════════════════════════════════════════════
//  CSS-ONLY FLOATING HEARTS (zero JS per-frame cost)
// ═══════════════════════════════════════════════════════════════
function createFloatingHearts() {
    const container = document.getElementById('bgHearts');
    const emojis = ['💕','🌸','✨','💗','⭐','🌺','💖','💝','🌹','🦋'];
    for (let i = 0; i < 18; i++) {
        const span = document.createElement('span');
        span.textContent = emojis[i % emojis.length];
        span.style.left = rand(0, 100) + '%';
        span.style.fontSize = rand(14, 26) + 'px';
        span.style.animationDuration = rand(8, 18) + 's';
        span.style.animationDelay = rand(0, 10) + 's';
        container.appendChild(span);
    }
}

// ═══════════════════════════════════════════════════════════════
//  INITIALIZATION
// ═══════════════════════════════════════════════════════════════
function resizeCanvas() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = (W * DPR) | 0;
    canvas.height = (H * DPR) | 0;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    buildVignetteCache();
}

function init() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();

    window.addEventListener('resize', () => {
        resizeCanvas();
        petals = [];
        initPetals();
    });

    createFloatingHearts();
    initPetals();
    setupEvents();
    setupIntroUI();
    requestAnimationFrame(loop);
}

window.addEventListener('DOMContentLoaded', init);
</script>
